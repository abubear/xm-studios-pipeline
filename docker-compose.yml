version: "3.8"

# Qdrant vector search for Character Library similarity search.
# Supabase services are managed separately via `npx supabase start`.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: xm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  qdrant_data:
